<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة غير موجودة · المخيم الشبابي للأمن السيبراني 2026</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--cyan:#00b1d5;--cyan-bright:#22d3f0;--navy-deep:#0a2a52;--navy:#295b98;--ink:#030c1e;--text-soft:#a9c6e0}
  *{margin:0;box-sizing:border-box}
  body{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px;
    font-family:'Tajawal',sans-serif;color:#eaf6fb;
    background:linear-gradient(120deg,var(--navy-deep),var(--navy) 45%,var(--cyan))}
  .code{font-family:'Oswald',sans-serif;font-size:clamp(80px,20vw,180px);font-weight:700;
    line-height:.9;color:#fff;text-shadow:0 8px 40px rgba(0,0,0,.4)}
  .lock{font-size:48px;margin-bottom:10px}
  h1{font-size:clamp(20px,4vw,30px);font-weight:900;margin:8px 0 10px}
  p{color:var(--text-soft);font-size:15px;max-width:40ch;margin:0 auto 26px}
  a{display:inline-block;background:#fff;color:var(--navy-deep);text-decoration:none;
    font-weight:800;padding:13px 26px;border-radius:12px;box-shadow:0 12px 30px -8px rgba(0,0,0,.4)}
  a:hover{transform:translateY(-2px)}
</style>
</head>
<body>
  <div>
    <div class="lock">🔒</div>
    <div class="code">404</div>
    <h1>هذه الصفحة خارج نطاق الوصول</h1>
    <p>يبدو أن الرابط غير صحيح أو أن الصفحة نُقلت. عُد إلى لوحة اليوم المباشر لمتابعة آخر التحديثات.</p>
    <a href="/">← العودة إلى اللوحة المباشرة</a>
  </div>
</body>
</html>
